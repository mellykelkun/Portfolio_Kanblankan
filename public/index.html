<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kablankan Tiemele Israël Kévin | Architecte Logiciel & IA — Portfolio professionnel">
    <meta name="theme-color" content="#0a0a0f">
    <title>Kablankan Tiemele Israël Kévin | Architecte Logiciel & IA</title>

    <!-- React + Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Polices Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
    <div id="root"></div>
    <div id="terminal-overlay" class="terminal-overlay"><span class="cmd"></span></div>

    <div id="mini-console">
        <div class="console-header">
            <span>⬛ mini-console ~ zsh</span>
            <button class="console-close-btn" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:0.8rem;">✕</button>
        </div>
        <div class="console-output" id="console-output">Tapez 'help' pour les commandes disponibles.
</div>
        <div class="console-input-row">
            <span class="console-prompt">❯</span>
            <input type="text" class="console-input" id="console-input" placeholder="commande...">
        </div>
    </div>

    <svg id="entity-rope-layer" aria-hidden="true">
        <line id="entity-rope-line" x1="0" y1="0" x2="0" y2="0"></line>
        <circle id="entity-rope-anchor" cx="0" cy="0" r="4"></circle>
    </svg>

    <!-- ENTITÉ CODE — Robot animé interactif -->
    <div id="entity-code" class="entity-wrapper">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" class="entity-svg">
            <defs>
                <radialGradient id="jetpackGlow">
                    <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.8"/>
                    <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
                </radialGradient>
            </defs>
            <g id="entity-body-group">
                <!-- Ombre portée -->
                <ellipse cx="50" cy="115" rx="18" ry="4" fill="var(--bg)" opacity="0.5" class="entity-shadow"/>
                <!-- Jetpack -->
                <g class="entity-jetpack" opacity="0">
                    <circle cx="50" cy="95" r="8" fill="url(#jetpackGlow)" class="jetpack-particle">
                        <animate attributeName="cy" values="95;105;95" dur="0.3s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="8;3;8" dur="0.3s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.8;0;0.8" dur="0.3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="42" cy="95" r="5" fill="url(#jetpackGlow)" class="jetpack-particle">
                        <animate attributeName="cy" values="95;108;95" dur="0.4s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="5;2;5" dur="0.4s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="58" cy="95" r="5" fill="url(#jetpackGlow)" class="jetpack-particle">
                        <animate attributeName="cy" values="95;108;95" dur="0.35s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="5;2;5" dur="0.35s" repeatCount="indefinite"/>
                    </circle>
                </g>
                <!-- Corps -->
                <rect x="30" y="50" width="40" height="40" rx="10" fill="var(--primary)" opacity="0.85" class="entity-body">
                    <animate attributeName="opacity" values="0.85;0.9;0.85" dur="3s" repeatCount="indefinite"/>
                </rect>
                <!-- Circuits corps -->
                <line x1="38" y1="58" x2="62" y2="58" stroke="var(--primary2)" stroke-width="1" opacity="0.5"/>
                <line x1="38" y1="64" x2="55" y2="64" stroke="var(--primary2)" stroke-width="1" opacity="0.4"/>
                <line x1="38" y1="70" x2="58" y2="70" stroke="var(--accent)" stroke-width="1" opacity="0.6"/>
                <circle cx="60" cy="75" r="3" fill="var(--accent)" opacity="0.8">
                    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
                </circle>
                <!-- Tête -->
                <rect x="25" y="15" width="50" height="40" rx="12" fill="var(--primary2)" opacity="0.9" class="entity-head">
                    <animate attributeName="opacity" values="0.9;0.95;0.9" dur="3s" repeatCount="indefinite"/>
                </rect>
                <!-- Visière -->
                <rect x="28" y="22" width="44" height="20" rx="8" fill="var(--bg)" opacity="0.6"/>
                <!-- Yeux -->
                <g class="entity-eyes">
                    <ellipse cx="40" cy="32" rx="6" ry="7" fill="var(--bg)"/>
                    <ellipse cx="60" cy="32" rx="6" ry="7" fill="var(--bg)"/>
                    <circle cx="41" cy="31" r="3.5" fill="var(--accent)" class="entity-pupil-left">
                        <animate attributeName="cx" values="41;43;39;41" dur="4s" repeatCount="indefinite"/>
                        <animate attributeName="cy" values="31;29;33;31" dur="5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="61" cy="31" r="3.5" fill="var(--accent)" class="entity-pupil-right">
                        <animate attributeName="cx" values="61;63;59;61" dur="4s" repeatCount="indefinite"/>
                        <animate attributeName="cy" values="31;29;33;31" dur="5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="39" cy="29" r="1.5" fill="white" opacity="0.7"/>
                    <circle cx="59" cy="29" r="1.5" fill="white" opacity="0.7"/>
                    <animate attributeName="opacity" values="1;1;0;0;1;1;1;1;0;0;1;1" dur="6s" repeatCount="indefinite"/>
                </g>
                <!-- Bouche -->
                <g class="entity-mouth">
                    <path d="M40 42 Q50 48 60 42" stroke="var(--bg)" stroke-width="2.5" fill="none" stroke-linecap="round" class="mouth-neutral"/>
                    <path d="M38 40 Q50 52 62 40" stroke="var(--bg)" stroke-width="2.5" fill="none" stroke-linecap="round" class="mouth-happy" opacity="0"/>
                    <ellipse cx="50" cy="44" rx="5" ry="6" fill="var(--bg)" class="mouth-surprised" opacity="0"/>
                </g>
                <!-- Sourcils -->
                <g class="entity-eyebrows">
                    <line x1="34" y1="24" x2="44" y2="22" stroke="var(--bg)" stroke-width="2" stroke-linecap="round" class="eyebrow-left">
                        <animate attributeName="y1" values="24;23;25;24" dur="4s" repeatCount="indefinite"/>
                    </line>
                    <line x1="56" y1="22" x2="66" y2="24" stroke="var(--bg)" stroke-width="2" stroke-linecap="round" class="eyebrow-right">
                        <animate attributeName="y1" values="22;23;21;22" dur="4s" repeatCount="indefinite"/>
                    </line>
                </g>
                <!-- Antenne -->
                <g class="entity-antenna">
                    <line x1="50" y1="15" x2="50" y2="3" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round">
                        <animate attributeName="x2" values="50;48;52;50" dur="2s" repeatCount="indefinite"/>
                    </line>
                    <circle cx="50" cy="2" r="5" fill="var(--accent)" opacity="0.9">
                        <animate attributeName="r" values="5;6;5" dur="1.5s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.9;0.5;0.9" dur="0.8s" repeatCount="indefinite"/>
                    </circle>
                    <path d="M40 2 Q35 -2 32 2" stroke="var(--accent)" stroke-width="1" fill="none" opacity="0.6">
                        <animate attributeName="opacity" values="0.6;0;0.6" dur="1s" repeatCount="indefinite"/>
                    </path>
                    <path d="M60 2 Q65 -2 68 2" stroke="var(--accent)" stroke-width="1" fill="none" opacity="0.6">
                        <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
                    </path>
                </g>
                <!-- Bras gauche -->
                <g class="entity-arm-left">
                    <animateTransform attributeName="transform" type="rotate" values="0 30 60;-15 30 60;0 30 60;15 30 60;0 30 60" dur="0.8s" repeatCount="indefinite" class="arm-swing-left"/>
                    <line x1="30" y1="60" x2="18" y2="48" stroke="var(--primary)" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="16" cy="46" r="5" fill="var(--primary2)">
                        <animate attributeName="r" values="5;4.5;5" dur="2s" repeatCount="indefinite"/>
                    </circle>
                </g>
                <!-- Bras droit -->
                <g class="entity-arm-right">
                    <animateTransform attributeName="transform" type="rotate" values="0 70 60;15 70 60;0 70 60;-15 70 60;0 70 60" dur="0.8s" repeatCount="indefinite" class="arm-swing-right"/>
                    <line x1="70" y1="60" x2="82" y2="48" stroke="var(--primary)" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="84" cy="46" r="5" fill="var(--primary2)">
                        <animate attributeName="r" values="5;4.5;5" dur="2s" repeatCount="indefinite"/>
                    </circle>
                </g>
                <!-- Main coucou -->
                <g class="entity-wave-hand" opacity="0">
                    <line x1="70" y1="60" x2="85" y2="30" stroke="var(--primary)" stroke-width="6" stroke-linecap="round">
                        <animateTransform attributeName="transform" type="rotate" values="0 70 60;-25 70 60;0 70 60;-25 70 60;0 70 60" dur="0.6s" repeatCount="indefinite"/>
                    </line>
                    <circle cx="86" cy="28" r="5" fill="var(--primary2)"/>
                </g>
                <!-- Loupe -->
                <g class="entity-loupe" opacity="0">
                    <line x1="70" y1="60" x2="78" y2="35" stroke="var(--primary)" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="82" cy="30" r="12" fill="rgba(255,255,255,0.1)" stroke="var(--accent)" stroke-width="2.5"/>
                    <line x1="90" y1="38" x2="98" y2="46" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>
                </g>
                <!-- Pouce levé -->
                <g class="entity-thumbs-up" opacity="0">
                    <line x1="70" y1="60" x2="80" y2="30" stroke="var(--primary)" stroke-width="6" stroke-linecap="round"/>
                    <line x1="80" y1="30" x2="76" y2="18" stroke="var(--primary2)" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="80" cy="30" r="5" fill="var(--primary2)"/>
                </g>
                <!-- Jambes -->
                <g class="entity-legs">
                    <g class="entity-leg-left">
                        <animateTransform attributeName="transform" type="rotate" values="0 40 90;20 40 90;0 40 90;-20 40 90;0 40 90" dur="0.8s" repeatCount="indefinite" class="leg-swing-left"/>
                        <line x1="40" y1="88" x2="36" y2="110" stroke="var(--primary)" stroke-width="6" stroke-linecap="round"/>
                        <ellipse cx="34" cy="112" rx="8" ry="4" fill="var(--bg)" stroke="var(--primary2)" stroke-width="1.5"/>
                    </g>
                    <g class="entity-leg-right">
                        <animateTransform attributeName="transform" type="rotate" values="0 60 90;-20 60 90;0 60 90;20 60 90;0 60 90" dur="0.8s" repeatCount="indefinite" class="leg-swing-right"/>
                        <line x1="60" y1="88" x2="64" y2="110" stroke="var(--primary)" stroke-width="6" stroke-linecap="round"/>
                        <ellipse cx="66" cy="112" rx="8" ry="4" fill="var(--bg)" stroke="var(--primary2)" stroke-width="1.5"/>
                    </g>
                </g>
                <!-- Poussière -->
                <g class="entity-dust" opacity="0">
                    <circle cx="32" cy="114" r="2" fill="var(--text2)" opacity="0.3">
                        <animate attributeName="cy" values="114;108;114" dur="0.4s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.3;0;0.3" dur="0.4s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="68" cy="114" r="2" fill="var(--text2)" opacity="0.3">
                        <animate attributeName="cy" values="114;108;114" dur="0.5s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.3;0;0.3" dur="0.5s" repeatCount="indefinite"/>
                    </circle>
                </g>
            </g>
        </svg>
    </div>

    <div id="scroll-progress">
        <div class="bar" style="width:0%;"></div>
        <span class="text">// Lecture à 0%...</span>
    </div>
    <div id="screen-saver"></div>
    <script type="text/babel" src="/scripts/core/runtime.jsx"></script>
    <script type="text/babel" src="/scripts/core/translations.jsx"></script>
    <script type="text/babel" src="/scripts/core/hooks.jsx"></script>
    <script type="text/babel" src="/scripts/core/components.jsx"></script>
    <script type="text/babel" src="/scripts/bootstrap/app.jsx"></script>
</body>
</html>
