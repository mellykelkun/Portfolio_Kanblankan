<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kablankan Tiemele Israël Kévin | Architecte Logiciel & IA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a2e;
            --primary: #6c5ce7;
            --primary2: #a29bfe;
            --accent: #00d2d3;
            --gold: #feca57;
            --text: #e2e8f0;
            --text2: #a0aec0;
            --code: #48bb78;
            --red: #fc5c65;
            --orange: #fd9644;
            --border: #2d2d44;
            --glow: 0 0 30px rgba(108,92,231,0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            cursor: default;
            scroll-behavior: smooth;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        /* Animations clés */
        @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideRight { from { opacity: 0; transform: translateX(-60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink { 0%,100% { border-color: transparent; } 50% { border-color: var(--primary); } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes orbit { from { transform: rotate(0deg) translateX(80px) rotate(0deg); } to { transform: rotate(360deg) translateX(80px) rotate(-360deg); } }
        @keyframes orbit2 { from { transform: rotate(120deg) translateX(120px) rotate(-120deg); } to { transform: rotate(480deg) translateX(120px) rotate(-480deg); } }
        @keyframes orbit3 { from { transform: rotate(240deg) translateX(60px) rotate(-240deg); } to { transform: rotate(600deg) translateX(60px) rotate(-600deg); } }
        @keyframes particleUp { 0% { opacity:1; transform:translateY(0) scale(1); } 100% { opacity:0; transform:translateY(-200px) scale(0); } }

        .particle { position: fixed; pointer-events: none; z-index: 9999; animation: particleUp 1.5s ease-out forwards; }
        .cursor-glow { position: fixed; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(108,92,231,0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; transform: translate(-50%,-50%); transition: opacity 0.3s; }
        .parallax-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .grid-line { position: absolute; background: rgba(108,92,231,0.03); }
        .grid-h { width: 100%; height: 1px; }
        .grid-v { width: 1px; height: 100%; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
        .section { padding: 120px 0; position: relative; }

        /* Navigation */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); transition: all 0.3s;
        }
        .navbar.scrolled { box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, var(--primary2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-links a { color: var(--text2); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.3s; position: relative; }
        .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--primary); transition: width 0.3s; }
        .nav-links a:hover { color: var(--text); }
        .nav-links a:hover::after { width: 100%; }

        /* Hero */
        .hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; }
        .hero-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; }
        .hero-orb1 { width: 400px; height: 400px; background: var(--primary); top: 10%; left: -10%; animation: float 6s ease-in-out infinite; }
        .hero-orb2 { width: 300px; height: 300px; background: var(--accent); bottom: 20%; right: -5%; animation: float 8s ease-in-out infinite 2s; }
        .hero-orb3 { width: 200px; height: 200px; background: var(--gold); top: 50%; left: 50%; animation: float 7s ease-in-out infinite 1s; }
        .hero-content { position: relative; z-index: 2; max-width: 800px; }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 50px;
            background: rgba(108,92,231,0.15); border: 1px solid rgba(108,92,231,0.3);
            font-size: 0.85rem; font-weight: 500; color: var(--primary2);
            margin-bottom: 32px; animation: slideUp 0.8s ease-out;
        }
        .hero-badge-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
        .hero-name { font-family: 'Space Grotesk', sans-serif; font-size: 4.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 20px; animation: slideUp 0.8s ease-out 0.2s both; }
        .hero-name span { background: linear-gradient(135deg, var(--primary2), var(--accent), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-title { font-size: 1.4rem; color: var(--text2); margin-bottom: 24px; font-weight: 400; animation: slideUp 0.8s ease-out 0.4s both; }
        .hero-description { font-size: 1.1rem; color: var(--text2); line-height: 1.8; margin-bottom: 40px; max-width: 600px; animation: slideUp 0.8s ease-out 0.6s both; }
        .hero-cta { display: flex; gap: 16px; animation: slideUp 0.8s ease-out 0.8s both; }
        .btn { padding: 14px 28px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; border: none; font-family: 'Inter', sans-serif; }
        .btn-primary { background: var(--primary); color: white; box-shadow: var(--glow); }
        .btn-primary:hover { background: var(--primary2); transform: translateY(-2px); box-shadow: 0 0 50px rgba(108,92,231,0.5); }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--primary); background: rgba(108,92,231,0.1); transform: translateY(-2px); }

        /* Code rain */
        .code-rain { position: absolute; right: 0; top: 0; width: 500px; height: 100%; opacity: 0.08; pointer-events: none; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; line-height: 1.5; color: var(--code); overflow: hidden; }
        .code-line { white-space: nowrap; }

        /* Section title */
        .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 16px; }
        .section-title span { background: linear-gradient(135deg, var(--primary2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-subtitle { color: var(--text2); font-size: 1.1rem; margin-bottom: 60px; max-width: 600px; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; margin-bottom: 80px; }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 32px; text-align: center; transition: all 0.3s; cursor: default;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: var(--glow); }
        .stat-number { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, var(--primary2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { color: var(--text2); margin-top: 8px; font-size: 0.9rem; }

        /* Skills */
        .skills-container { display: flex; flex-wrap: wrap; gap: 12px; }
        .skill-tag {
            padding: 10px 20px; border-radius: 50px;
            background: var(--surface2); border: 1px solid var(--border);
            font-size: 0.9rem; font-weight: 500; cursor: default;
            transition: all 0.3s; color: var(--text2);
        }
        .skill-tag:hover {
            border-color: var(--primary); background: rgba(108,92,231,0.1);
            color: var(--primary2); transform: translateY(-2px);
        }

        /* Projects */
        .projects-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; }
        .project-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 36px; transition: all 0.4s; cursor: pointer; position: relative; overflow: hidden;
        }
        .project-card:hover { border-color: var(--primary); transform: translateY(-8px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .project-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at var(--mx) var(--my), rgba(108,92,231,0.1) 0%, transparent 50%); opacity: 0; transition: opacity 0.3s; }
        .project-card:hover::before { opacity: 1; }
        .project-icon { font-size: 2.5rem; margin-bottom: 20px; }
        .project-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
        .project-desc { color: var(--text2); font-size: 0.95rem; line-height: 1.6; margin-bottom: 16px; }
        .project-tech { display: flex; flex-wrap: wrap; gap: 8px; }
        .project-tech span {
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem;
            background: rgba(108,92,231,0.15); color: var(--primary2); font-weight: 500;
        }

        /* Expanded project modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 48px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto;
            animation: scaleIn 0.3s ease-out;
        }
        .modal-close {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer;
        }

        /* Experience timeline */
        .timeline { position: relative; padding-left: 40px; }
        .timeline::before { content: ''; position: absolute; left: 16px; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item { position: relative; margin-bottom: 48px; }
        .timeline-dot { position: absolute; left: -32px; top: 4px; width: 16px; height: 16px; border-radius: 50%; background: var(--primary); border: 3px solid var(--bg); z-index: 1; }
        .timeline-date { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent); margin-bottom: 8px; }
        .timeline-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
        .timeline-desc { color: var(--text2); line-height: 1.6; }

        /* Footer */
        .footer { text-align: center; padding: 60px 24px; border-top: 1px solid var(--border); }
        .footer-text { color: var(--text2); font-size: 0.9rem; }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-name { font-size: 2.8rem; }
            .projects-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2,1fr); }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ==================== PARTICULES MAGIQUES ====================
        const useParticles = () => {
            useEffect(() => {
                const handleClick = (e) => {
                    const colors = ['#6c5ce7', '#a29bfe', '#00d2d3', '#feca57', '#fc5c65'];
                    for (let i = 0; i < 8; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'particle';
                        particle.style.left = e.clientX + 'px';
                        particle.style.top = e.clientY + 'px';
                        particle.style.width = (4 + Math.random() * 8) + 'px';
                        particle.style.height = particle.style.width;
                        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                        particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                        particle.style.animationDuration = (1 + Math.random() * 1.5) + 's';
                        const angle = Math.random() * Math.PI * 2;
                        const distance = 30 + Math.random() * 80;
                        particle.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                        particle.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                        particle.style.animation = `particleUp ${1 + Math.random() * 1.5}s ease-out forwards`;
                        particle.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance - 200}px) scale(0)`;
                        document.body.appendChild(particle);
                        setTimeout(() => particle.remove(), 2000);
                    }
                };
                document.addEventListener('click', handleClick);
                return () => document.removeEventListener('click', handleClick);
            }, []);
        };

        // ==================== CURSEUR GLOW ====================
        const useCursorGlow = () => {
            useEffect(() => {
                const glow = document.createElement('div');
                glow.className = 'cursor-glow';
                document.body.appendChild(glow);
                const handleMove = (e) => {
                    glow.style.left = e.clientX + 'px';
                    glow.style.top = e.clientY + 'px';
                    glow.style.opacity = '1';
                };
                const handleLeave = () => { glow.style.opacity = '0'; };
                document.addEventListener('mousemove', handleMove);
                document.addEventListener('mouseleave', handleLeave);
                return () => {
                    document.removeEventListener('mousemove', handleMove);
                    document.removeEventListener('mouseleave', handleLeave);
                    glow.remove();
                };
            }, []);
        };

        // ==================== COMPOSANTS ====================
        function Navbar() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', h);
                return () => window.removeEventListener('scroll', h);
            }, []);
            return (
                <nav className={`navbar ${scrolled ? 'scrolled' : ''}`}>
                    <div className="nav-inner">
                        <div className="nav-logo" onClick={() => window.scrollTo({top:0,behavior:'smooth'})}>
                            &lt;KK /&gt;
                        </div>
                        <ul className="nav-links">
                            <li><a href="#about" onClick={e=>{e.preventDefault();document.getElementById('about').scrollIntoView({behavior:'smooth'});}}>À propos</a></li>
                            <li><a href="#projects" onClick={e=>{e.preventDefault();document.getElementById('projects').scrollIntoView({behavior:'smooth'});}}>Projets</a></li>
                            <li><a href="#skills" onClick={e=>{e.preventDefault();document.getElementById('skills').scrollIntoView({behavior:'smooth'});}}>Compétences</a></li>
                            <li><a href="#contact" onClick={e=>{e.preventDefault();document.getElementById('contact').scrollIntoView({behavior:'smooth'});}}>Contact</a></li>
                        </ul>
                    </div>
                </nav>
            );
        }

        function Hero() {
            const codeLines = [
                'const architect = new SystemArchitect();',
                'architect.design({',
                '  stack: "full-stack",',
                '  ai: "orchestrated",',
                '  security: "zero-trust",',
                '  scalability: "unlimited"',
                '});',
                'architect.deploy();',
                '// Output: Production-ready ecosystem',
                '',
                'class AIAgent extends AutonomousAgent {',
                '  constructor() {',
                '    super({ precision: "surgical" });',
                '    this.capabilities = [',
                '      "code_audit",',
                '      "system_orchestration",',
                '      "security_review"',
                '    ];',
                '  }',
                '}',
                '',
                'const prompt = new Prompt({',
                '  target: "optimal_performance",',
                '  context: "full_codebase",',
                '  style: "zero_ambiguity"',
                '});',
                'ai.engineer(prompt);',
            ];

            const [typedText, setTypedText] = useState('');
            const [lineIndex, setLineIndex] = useState(0);
            const [charIndex, setCharIndex] = useState(0);
            const [titleVisible, setTitleVisible] = useState(false);

            useEffect(() => {
                if (lineIndex < codeLines.length) {
                    if (charIndex < codeLines[lineIndex].length) {
                        const timer = setTimeout(() => {
                            setTypedText(prev => prev + codeLines[lineIndex][charIndex]);
                            setCharIndex(c => c + 1);
                        }, 15);
                        return () => clearTimeout(timer);
                    } else {
                        const timer = setTimeout(() => {
                            setTypedText(prev => prev + '\n');
                            setLineIndex(l => l + 1);
                            setCharIndex(0);
                        }, 30);
                        return () => clearTimeout(timer);
                    }
                } else {
                    setTitleVisible(true);
                }
            }, [lineIndex, charIndex]);

            return (
                <section className="hero" id="hero">
                    <div className="hero-orb hero-orb1"></div>
                    <div className="hero-orb hero-orb2"></div>
                    <div className="hero-orb hero-orb3"></div>
                    <div className="code-rain">
                        <pre>{typedText}<span style={{animation:'blink 0.7s infinite',borderRight:'2px solid var(--primary)'}}>&nbsp;</span></pre>
                    </div>
                    <div className="container">
                        <div className="hero-content">
                            <div className="hero-badge" style={titleVisible ? {} : {opacity:0}}>
                                <span className="hero-badge-dot"></span>
                                Disponible pour missions
                            </div>
                            <h1 className="hero-name" style={titleVisible ? {} : {opacity:0}}>
                                <span>Kablankan</span><br/>Tiemele Israël Kévin
                            </h1>
                            <p className="hero-title" style={titleVisible ? {} : {opacity:0}}>
                                Architecte Logiciel | Ingénieur en IA Appliquée | Lead Developer
                            </p>
                            <p className="hero-description" style={titleVisible ? {} : {opacity:0}}>
                                Je conçois des écosystèmes logiciels autonomes où l'IA n'est pas une fonctionnalité,
                                mais un <strong>membre actif de l'équipe de développement</strong>, orchestrée avec
                                une précision chirurgicale.
                            </p>
                            <div className="hero-cta" style={titleVisible ? {} : {opacity:0}}>
                                <a href="#projects" className="btn btn-primary" onClick={e=>{e.preventDefault();document.getElementById('projects').scrollIntoView({behavior:'smooth'});}}>
                                    <span>🚀</span> Voir mes réalisations
                                </a>
                                <a href="#contact" className="btn btn-outline" onClick={e=>{e.preventDefault();document.getElementById('contact').scrollIntoView({behavior:'smooth'});}}>
                                    <span>📬</span> Me contacter
                                </a>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        function Stats() {
            const stats = [
                { number: '15+', label: 'Projets Complexes' },
                { number: '8+', label: 'Stacks Maîtrisées' },
                { number: '10K+', label: 'Heures de Code' },
                { number: '∞', label: 'Capacité d\'Apprentissage' },
            ];
            return (
                <div className="container">
                    <div className="stats-grid">
                        {stats.map((s, i) => (
                            <div className="stat-card" key={i}>
                                <div className="stat-number">{s.number}</div>
                                <div className="stat-label">{s.label}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function About() {
            return (
                <section className="section" id="about">
                    <div className="container">
                        <h2 className="section-title"><span>À propos</span> de moi</h2>
                        <p className="section-subtitle">
                            Un développeur autodidacte devenu architecte de systèmes complexes.
                        </p>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'32px'}}>
                            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',padding:'32px'}}>
                                <div style={{fontSize:'2rem',marginBottom:'16px'}}>🧠</div>
                                <h3 style={{fontFamily:'Space Grotesk',marginBottom:'12px'}}>Mon Super-Pouvoir</h3>
                                <p style={{color:'var(--text2)',lineHeight:1.8}}>
                                    Comprendre et maîtriser toute nouvelle technologie en un temps record,
                                    comme si je la pratiquais depuis des années. Je ne "vibe code" pas :
                                    <strong> je dirige l'IA pour forger un code plus robuste et plus sûr</strong>.
                                </p>
                            </div>
                            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',padding:'32px'}}>
                                <div style={{fontSize:'2rem',marginBottom:'16px'}}>🎯</div>
                                <h3 style={{fontFamily:'Space Grotesk',marginBottom:'12px'}}>Ma Vision</h3>
                                <p style={{color:'var(--text2)',lineHeight:1.8}}>
                                    Transformer des concepts en solutions logicielles robustes, évolutives et
                                    monétisables. Mon approche holistique couvre l'infrastructure, le développement,
                                    la sécurité et le déploiement.
                                </p>
                            </div>
                            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',padding:'32px'}}>
                                <div style={{fontSize:'2rem',marginBottom:'16px'}}>🔐</div>
                                <h3 style={{fontFamily:'Space Grotesk',marginBottom:'12px'}}>Sécurité First</h3>
                                <p style={{color:'var(--text2)',lineHeight:1.8}}>
                                    Chaque ligne de code est pensée pour la sécurité. Audit, sanitization,
                                    rate limiting, chiffrement : la sécurité n'est pas une option, c'est
                                    une obsession intégrée à l'architecture.
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        function Projects() {
            const [expanded, setExpanded] = useState(null);
            const projects = [
                {
                    icon: '💬', name: 'Heylee', desc: 'Messagerie instantanée sécurisée avec Heylee ID virtuel, traitement vidéo asynchrone et présence temps réel.',
                    tech: ['Flutter', 'Node.js', 'MongoDB', 'Redis', 'WebSocket', 'BullMQ'],
                    detail: 'Architecture complète de messagerie avec système d\'identifiant propriétaire, chiffrement, chat temps réel multi-devices, capture vidéo multi-segments avec traitement FFmpeg, et file d\'attente hors-ligne. Infrastructure scalable avec Kubernetes, PgBouncer, et monitoring Prometheus/Grafana.'
